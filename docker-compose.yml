services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-paw_of_help}
    ports:
      - "5432:5432"
    volumes:
      - paw_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - paw_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_TAG_MODEL: ${OLLAMA_TAG_MODEL:-gemma2:9b}
    volumes:
      - ollama_data:/root/.ollama
    # При первом старте тянет модель в volume ollama_data
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 3
        ollama pull "$${OLLAMA_TAG_MODEL}" || true
        wait
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-paw_of_help}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5500,http://127.0.0.1:5500}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
      HF_HOME: /var/cache/huggingface
      HF_TOKEN: ${HF_TOKEN:-}
      UPLOAD_DIR: /app/uploads
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-10}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_TAG_MODEL: ${OLLAMA_TAG_MODEL:-gemma2:9b}
      CONTENT_MODEL_BASE: ${CONTENT_MODEL_BASE:-weeqeen/rubert-base-cased-finetuned-moderation}
      CONTENT_MODEL_TINY: ${CONTENT_MODEL_TINY:-weeqeen/rubert-tiny2-moderation}
    volumes:
      - huggingface_hub:/var/cache/huggingface
      - paw_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

    command: >
      bash -lc "python -c \"import time, socket; code='''h=\\\"db\\\"\\np=5432\\ndeadline=time.time()+60\\n\\nwhile True:\\n    try:\\n        s=socket.create_connection((h,p), timeout=2)\\n        s.close()\\n        break\\n    except OSError:\\n        if time.time()>deadline:\\n            raise\\n        time.sleep(1)\\n'''; exec(code)\" && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  paw_db:
  paw_redis:
  huggingface_hub:
  paw_uploads:
  ollama_data: