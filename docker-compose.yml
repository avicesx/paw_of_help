services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-paw_of_help}
    ports:
      - "5432:5432"
    volumes:
      - paw_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - paw_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/paw_of_help}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      DATABASE_ECHO: ${DATABASE_ECHO:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

    command: >
      bash -lc "python -c \"import time, socket; code='''h=\\\"db\\\"\\np=5432\\ndeadline=time.time()+60\\n\\nwhile True:\\n    try:\\n        s=socket.create_connection((h,p), timeout=2)\\n        s.close()\\n        break\\n    except OSError:\\n        if time.time()>deadline:\\n            raise\\n        time.sleep(1)\\n'''; exec(code)\" && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  paw_db:
  paw_redis: