<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-body">
  <main class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand"><img src="../assets/paw-logo.png" alt="Paw"><span>Админка</span></div>
      <nav class="admin-nav">
        <a class="active" href="dashboard.html">Панель</a>
        <a href="users.html">Пользователи</a>
        <a href="organizations.html">Организации</a>
        <a href="reports.html">Жалобы</a>
        <a href="moderation.html">Модерация</a>
        <a href="support.html">Поддержка</a>
        <a href="settings.html">Настройки модерации</a>
        <a href="audit.html">Аудит</a>
        <a href="../pages/profile.html">В приложение</a>
      </nav>
    </aside>
    <section class="admin-content">
      <header class="admin-header"><h1>Панель администратора</h1><div id="adminUserRole" class="admin-role-badge"></div><button onclick="adminLogout()">Выйти</button></header>
      <div id="adminStatus" class="admin-status"></div>
      <div id="dashboardCards" class="admin-grid"></div>
    </section>
  </main>
  <script src="../js/script.js"></script>
  <script src="../js/admin-api.js"></script>
  <script src="../js/admin.js"></script>
  <script>
  (async () => {
    const badge = document.getElementById("adminUserRole");
    try {
      const { data } = await apiRequest("/auth/me", { auth: true });
      if (badge) badge.textContent = data.username || data.email || "Пользователь";
    } catch(e) {
      const isAuthErr = e.status === 401 || (e.message||"").includes("токен") || (e.message||"").includes("Срок") || (e.message||"").includes("авториз");
      if (isAuthErr) {
        adminSetStatus("Сессия истекла. Войдите снова.", "error");
        setTimeout(() => window.location.href = "../pages/login.html", 1500);
        return;
      }
    }
    try {
      const r = await fetch(`${API_URL}/openapi.json`);
      const spec = await r.json();
      const paths = Object.keys(spec.paths || {});
      const adminPaths = paths.filter(p => p.startsWith("/admin"));
      if (adminPaths.length === 0) {
        adminSetStatus(
          "⚠️ Бекенд запущен, но маршруты /admin НЕ зарегистрированы. " +
          "Контейнер не пересобран после обновления кода. " +
          "Выполните: docker-compose down && docker-compose up --build",
          "error"
        );
        return;
      }
    } catch(diagErr) {
      
    }
    loadAdminDashboard();
  })();
</script>
</body>
</html>
