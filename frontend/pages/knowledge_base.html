<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>База знаний</title>
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body>
  <main class="phone-shell">
    <div class="bg-paw-overlay"><span>
      <img src="../assets/paw-bg.png" alt="Paw Background" class="bg-paw-image">
    </span></div>

    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" type="button" onclick="toggleMenu()">
          <img src="../assets/topbar/icon-menu.svg" alt="Меню" class="topbar-icon">
        </button>
      </div>

      <a href="post_feed.html" class="topbar-logo">
        <div class="paw-icon">
          <img src="../assets/topbar/paw-logo.svg" alt="Paw" class="paw-icon-img">
        </div>
      </a>

      <div class="topbar-right">
        <div class="notification-container-wrapper"></div>
        
        <a href="profile.html" class="topbar-profile-link">
          <img src="../assets/topbar/profile-icon.svg" alt="Профиль" class="topbar-icon">
        </a>
      </div>
    </header>

    <div class="back-btn-container">
      <button class="icon-btn" type="button" onclick="history.back()">
        <img src="../assets/topbar/arrow.svg" alt="Назад" class="topbar-icon">
      </button>
    </div>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="org_selector.html" class="side-link">Организации</a>
        <a href="knowledge_base.html" class="side-link">База знаний</a>
        <a href="post_feed.html" class="side-link">Лента новостей</a>
        <a href="chats.html" class="side-link">Чаты</a>
      </div>
    </aside>

    <section class="knowledge-screen">
      <h1 class="screen-title">База знаний</h1>
      <div class="search-container" style="display: flex; gap: 8px; align-items: center;">
        <input type="text" class="search-input" placeholder="Поиск по базе знаний..." id="searchInput" style="flex: 1; margin-bottom: 0;">
      </div>

      <div class="nav-buttons">
        <button class="nav-btn active" type="button" onclick="switchTab('encyclopedia')">Энциклопедия</button>
        <button class="nav-btn" type="button" onclick="switchTab('articles')">Статьи</button>
      </div>

      <div class="criteria-section" id="criteriaSection">
      </div>

      <div class="results-section">

        <div id="articles-content" class="content-section hidden">
          <button class="add-article-button" type="button" onclick="location.href='create_article.html'">Написать статью</button>
          <div id="articles-container" class="articles-container">
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/knowledgeTemplates.js"></script>
  <script src="../js/articles.js"></script>
  <script src="../js/dropdown.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!localStorage.getItem("token")) {
        window.location.href = "login.html";
      }
    });
  </script>
</body>
</html>
