<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль животного — Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed animal-figma-page page_animal_profile">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>

      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>

      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <section class="animal-profile-screen">
      <div class="back-row">
        <a href="animal-select.html" class="back-link">⬅</a>
        <div class="back-title">Профиль животного</div>
      </div>

      <div id="animalProfileContent">
        <div class="empty-small">Загрузка...</div>
      </div>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/tasks.js"></script>
  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const animalId = params.get('id');
      const content = document.getElementById('animalProfileContent');

      if (!animalId) {
        content.innerHTML = '<div class="empty-small">Животное не найдено</div>';
        return;
      }

      try {
        const { data: a } = await apiRequest(`/animals/${animalId}`);

        // Значения справочников приходят на английском — показываем по-русски (как в дизайне).
        const GENDER_RU = { male: 'Мужской', female: 'Женский', unknown: 'Не указан' };
        const SIZE_RU = { small: 'Маленький', medium: 'Средний', large: 'Большой', extra_large: 'Очень большой' };
        const val = (v) => (v === null || v === undefined || String(v).trim() === '') ? '—' : escapeHtml(String(v));
        const mediaUrl = (u) => !u ? '' : (/^https?:/i.test(u) ? u : `${API_URL}${u.startsWith('/') ? '' : '/'}${u}`);

        const animalPhoto = Array.isArray(a.photos) && a.photos.length ? mediaUrl(a.photos[0]) : null;

        // Поля профиля животного в порядке дизайна (Профиль животного.svg)
        const rows = [
          ['Кличка', a.name],
          ['Возраст', a.age],
          ['Вид', a.species],
          ['Порода', a.breed],
          ['Пол', a.gender ? (GENDER_RU[a.gender] || a.gender) : null],
          ['Размер', a.size ? (SIZE_RU[a.size] || a.size) : null],
          ['Характер', a.character],
          ['Состояние здоровья', a.health_status],
          ['Особые потребности', a.special_needs],
          ['История животного', a.description],
        ];

        content.innerHTML = `
          <div class="animal-profile-card">
            <div class="animal-profile-avatar">${animalPhoto ? `<img src="${escapeHtml(animalPhoto)}" alt="${escapeHtml(a.name || '')}">` : ''}</div>
            <input type="file" id="animalPhotoInput" accept="image/*" style="display:none" onchange="uploadAnimalPhoto(${a.id})" />
            <button type="button" class="animal-photo-btn" onclick="document.getElementById('animalPhotoInput').click()">${animalPhoto ? '📷 Изменить фото' : '📷 Добавить фото'}</button>

            <div class="animal-profile-section">
              ${rows.map(([label, value]) => `<div class="animal-profile-row"><span class="apl">${label}</span><span>${val(value)}</span></div>`).join('')}
            </div>

            <div class="animal-profile-actions">
              <a href="task-create.html" class="primary-action-link" onclick="setSelectedAnimal(${JSON.stringify(a).replace(/"/g,'&quot;')})">
                Создать задачу для этого животного
              </a>
            </div>
          </div>
        `;
        document.title = (a.name || 'Животное') + ' — Paw';
      } catch(err) {
        content.innerHTML = '<div class="empty-small">' + escapeHtml(err.message || 'Ошибка загрузки') + '</div>';
      }

      loadNotificationsCount();
    })();
  </script>
</body>
</html>
