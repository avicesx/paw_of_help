<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль животного — Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed animal-figma-page page_animal_profile">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>

      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>

      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <section class="animal-profile-screen">
      <div class="back-row">
        <a href="animal-select.html" class="back-link">⬅</a>
        <div class="back-title">Профиль животного</div>
      </div>

      <div id="animalProfileContent">
        <div class="empty-small">Загрузка...</div>
      </div>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/tasks.js"></script>
  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const animalId = params.get('id');
      const content = document.getElementById('animalProfileContent');

      if (!animalId) {
        content.innerHTML = '<div class="empty-small">Животное не найдено</div>';
        return;
      }

      try {
        const { data: a } = await apiRequest(`/animals/${animalId}`);
        content.innerHTML = `
          <div class="animal-profile-card">
            <div class="animal-profile-avatar"></div>
            <h2 class="animal-profile-name">${escapeHtml(a.name || 'Без имени')}</h2>
            <div class="animal-profile-sub">${escapeHtml(a.species || 'Вид не указан')} · ${escapeHtml(a.breed || 'Порода не указана')}</div>

            <div class="animal-profile-section">
              <div class="animal-profile-row"><span class="apl">Возраст</span><span>${escapeHtml(String(a.age_years ?? '—'))}</span></div>
              <div class="animal-profile-row"><span class="apl">Пол</span><span>${escapeHtml(a.gender || '—')}</span></div>
              <div class="animal-profile-row"><span class="apl">Окрас</span><span>${escapeHtml(a.color || '—')}</span></div>
              <div class="animal-profile-row"><span class="apl">Вес</span><span>${a.weight_kg ? escapeHtml(String(a.weight_kg)) + ' кг' : '—'}</span></div>
              <div class="animal-profile-row"><span class="apl">Стерилизован</span><span>${a.is_sterilized ? 'Да' : 'Нет'}</span></div>
              <div class="animal-profile-row"><span class="apl">Вакцинирован</span><span>${a.is_vaccinated ? 'Да' : 'Нет'}</span></div>
            </div>

            ${a.description ? `<div class="animal-profile-desc">${escapeHtml(a.description)}</div>` : ''}

            <div class="animal-profile-actions">
              <a href="task-create.html" class="primary-action-link" onclick="setSelectedAnimal(${JSON.stringify(a).replace(/"/g,'&quot;')})">
                Создать задачу для этого животного
              </a>
            </div>
          </div>
        `;
        document.title = (a.name || 'Животное') + ' — Paw';
      } catch(err) {
        content.innerHTML = '<div class="empty-small">' + escapeHtml(err.message || 'Ошибка загрузки') + '</div>';
      }

      loadNotificationsCount();
    })();
  </script>
</body>
</html>
