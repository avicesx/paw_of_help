<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Организация — Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_org">
  <main class="phone-shell">
    <div class="bg-paw-overlay"><span>
      <img src="../assets/paw-bg.png" alt="Paw Background" class="bg-paw-image">
    </span></div>

    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" type="button" onclick="toggleMenu()">
          <img src="../assets/topbar/icon-menu.svg" alt="Меню" class="topbar-icon">
        </button>
      </div>

      <a href="post_feed.html" class="topbar-logo">
        <div class="paw-icon">
          <img src="../assets/topbar/paw-logo.svg" alt="Paw" class="paw-icon-img">
        </div>
      </a>

      <div class="topbar-right">
        <div class="notification-container-wrapper"></div>
        
        <a href="profile.html" class="topbar-profile-link">
          <img src="../assets/topbar/profile-icon.svg" alt="Профиль" class="topbar-icon">
        </a>
      </div>
    </header>

    <div class="back-btn-container">
      <button class="icon-btn" type="button" onclick="history.back()">
        <img src="../assets/topbar/arrow.svg" alt="Назад" class="topbar-icon">
      </button>
    </div>

    <section class="org-profile-screen">
      <div class="back-row">
        <a href="org-catalog.html" class="back-link" aria-label="Назад">⬅</a>
      </div>

      <div class="org-profile-head">
        <div id="orgProfileIcon" class="org-profile-icon" aria-hidden="true"></div>
        <h1 id="orgProfileName" class="org-profile-name">Организация</h1>
      </div>

      <div class="org-info-box">
        <div class="org-info-label">Информация</div>
        <div id="orgProfileInfo" class="org-info-text"></div>
      </div>

      <button id="orgSubscribeBtn" class="org-subscribe-btn" type="button" onclick="toggleSubscribe()">Подписаться</button>

      <div id="orgManageBar" class="org-manage-bar" style="display:none">
        <button id="orgPostBtn" type="button" class="org-manage-btn" onclick="orgGoPost()">+ Пост</button>
        <button id="orgCuratorsBtn" type="button" class="org-manage-btn" onclick="orgGoCurators()">Кураторы</button>
        <button id="orgEditBtn" type="button" class="org-manage-btn" onclick="orgGoEdit()" style="display:none">Изменить</button>
      </div>

      <div class="org-tabs">
        <button class="org-tab active" type="button" data-tab="posts" onclick="switchOrgTab('posts')">Посты</button>
        <button class="org-tab" type="button" data-tab="animals" onclick="switchOrgTab('animals')">Наши животные</button>
        <button class="org-tab" type="button" data-tab="tasks" onclick="switchOrgTab('tasks')">Заявки</button>
      </div>
      <div id="orgTabContent" class="org-tab-content"></div>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/org.js"></script>
</body>
</html>
