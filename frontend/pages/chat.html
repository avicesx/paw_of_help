<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чат — Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_chat">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>
      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu"><div class="side-menu-inner"></div></aside>

    <section class="chat-screen">
      <div class="chat-topline">
        <a href="chats.html" class="back-link" aria-label="Назад">⬅</a>
        <h1 id="chatTitle" class="chat-title">Чат</h1>
        <div class="chat-menu-wrap">
          <button class="chat-menu-btn" type="button" onclick="toggleChatMenu()" aria-label="Меню">⋮</button>
          <div id="chatMenu" class="chat-menu">
            <button type="button" onclick="leaveReviewFromChat()">Оставить отзыв</button>
            <button type="button" onclick="location.href='complaints.html'">Пожаловаться</button>
          </div>
        </div>
      </div>

      <div id="messagesList" class="messages-list"></div>

      <div class="chat-input-bar">
        <input id="messageInput" class="chat-input" type="text" placeholder="Введите сообщение…" />
        <button class="chat-send-btn" type="button" onclick="sendChatMessage()" aria-label="Отправить">➤</button>
      </div>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/chats.js"></script>
</body>
</html>
