<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мероприятия</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="paw-designed page_events">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>

      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>

      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="#" class="side-link">Организации</a>
        <a href="#" class="side-link">База знаний</a>
      </div>
    </aside>

    <section class="events-screen">
      <h1 class="screen-title">Мероприятия</h1>
      <div class="back-row compact-back-row">
        <a href="profile.html" class="back-link">⬅</a>
        <a href="event-create.html" class="primary-action-link small-action-link">Создать мероприятие</a>
      </div>

      <div class="filter-panel visible-panel">
        <input id="eventsSearch" class="field" type="text" placeholder="Поиск" oninput="loadEventsPage()" />
        <select id="eventsTypeFilter" class="field" onchange="loadEventsPage()">
          <option value="">Все типы</option>
          <option value="adoption">Пристройство</option>
          <option value="fundraising">Сбор помощи</option>
          <option value="volunteer">Волонтёрство</option>
          <option value="meeting">Встреча</option>
          <option value="other">Другое</option>
        </select>
      </div>

      <div id="eventsList" class="events-list"></div>

    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/maps.js"></script>
  <script src="../js/events.js"></script>
  <script>loadEventsPage();</script>
</body>
</html>
