<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заявка организации — Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_org_create">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>
      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu"><div class="side-menu-inner"></div></aside>

    <section class="org-create-screen">
      <div class="back-row">
        <a href="org-catalog.html" class="back-link" aria-label="Назад">⬅</a>
        <div class="back-title">Заявка на организацию</div>
      </div>

      <form class="org-create-card task-form-card" onsubmit="createOrg(event)">
        <label class="form-label">Название организации:
          <input id="orgName" class="field" type="text" placeholder="Например: Приют «Лапа помощи»" />
        </label>
        <label class="form-label">Описание:
          <textarea id="orgDescription" class="field textarea" placeholder="Чем занимается организация"></textarea>
        </label>
        <label class="form-label">ИНН:
          <input id="orgInn" class="field" type="text" placeholder="Если есть" />
        </label>
        <label class="form-label">Адрес:
          <input id="orgAddress" class="field" type="text" placeholder="Город, улица" />
        </label>
        <p id="orgCreateStatus" class="save-status"></p>
        <button class="submit-btn full-width" type="submit">Подать заявку</button>
      </form>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/org.js"></script>
  <script>ensureAuth("login.html");</script>
</body>
</html>
