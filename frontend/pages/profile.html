<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_profile profile-figma-exact">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>

      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>

      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="org_selector.html" class="side-link">Организации</a>
        <a href="knowledge_base.html" class="side-link">База знаний</a>
        <a href="post_feed.html" class="side-link">Лента новостей</a>
        <a href="chats.html" class="side-link">Чаты</a>
      </div>
    </aside>

    <section class="profile-screen">

      <div class="profile-head">
        <img class="profile-avatar-img" src="../assets/figma/profile-avatar-large.svg" alt="Профиль" />

        <div class="profile-meta">
          <div id="profileFirstName" class="profile-first-name">Пользователь</div>
          <div id="profileLastName" class="profile-last-name"></div>
        </div>
      </div>

      <div class="profile-rating-row">
        <span id="profileRatingValue" class="profile-rating-value">0,0</span>
        <img class="profile-rating-star" src="../assets/figma/star.svg" alt="★" />
        <span id="profileReviewCount" class="profile-review-count">0</span>
        <a id="profileReviewsLink" class="profile-reviews-link" href="reviews.html">отзывы</a>
      </div>

      <div class="author-section-label">
        <img src="../assets/figma/author-label-text.svg" alt="Профиль автора" />
      </div>

      <div class="author-empty-state">
        <img src="../assets/figma/empty-articles-text.svg" alt="Вы пока не писали статьи" />
      </div>

      <img class="profile-paw-bg-img" src="../assets/figma/profile-paw-bg.svg" alt="" />

      <button class="settings-btn" type="button" onclick="window.location.href='settings.html'" aria-label="Настройки"></button>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script>
    loadProfile();
    loadNotificationsCount();
  </script>
</body>
</html>
