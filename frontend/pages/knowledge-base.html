<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>База знаний — Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_kb">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>
      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu"><div class="side-menu-inner"></div></aside>

    <section class="kb-screen">
      <input id="kbSearch" class="kb-search" type="search" placeholder="Поиск" oninput="filterKb()" />

      <div class="kb-tabs">
        <button class="kb-tab" type="button" data-tab="encyclopedia" onclick="switchKbTab('encyclopedia')">Энциклопедия</button>
        <button class="kb-tab active" type="button" data-tab="articles" onclick="switchKbTab('articles')">Статьи</button>
      </div>

      <div id="kbArticlesPane">
        <a href="article-create.html" class="kb-write-link">Написать статью</a>
        <div id="kbArticles" class="kb-list"></div>
      </div>

      <div id="kbEncyclopedia" style="display:none">
        <div id="kbSpeciesList" class="kb-species"></div>
        <div id="kbBreedDetail" class="kb-breed-detail"></div>
      </div>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/kb.js"></script>
</body>
</html>
