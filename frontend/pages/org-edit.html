<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Изменение организации — Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_org_edit">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>
      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu"><div class="side-menu-inner"></div></aside>

    <section class="org-edit-screen">
      <div class="back-row">
        <a href="javascript:history.back()" class="back-link" aria-label="Назад">⬅</a>
      </div>

      <form class="org-edit-card" onsubmit="saveOrgEdit(event)">
        <label class="org-edit-field"><span>Название:</span>
          <input id="edit_org_name" type="text" class="org-edit-input" />
        </label>
        <label class="org-edit-field"><span>Описание:</span>
          <textarea id="edit_org_description" class="org-edit-input org-edit-textarea"></textarea>
        </label>
        <label class="org-edit-field"><span>ИНН:</span>
          <input id="edit_org_inn" type="text" class="org-edit-input" />
        </label>
        <label class="org-edit-field"><span>Адрес:</span>
          <input id="edit_org_address" type="text" class="org-edit-input" />
        </label>

        <div class="org-edit-logo-row">
          <span>Изменить логотип:</span>
          <button type="button" id="editOrgLogo" class="org-edit-logo" onclick="document.getElementById('orgLogoInput').click()" aria-label="Загрузить логотип"></button>
          <input type="file" id="orgLogoInput" accept="image/*" style="display:none" onchange="uploadOrgLogo(this)" />
        </div>
      </form>

      <p id="orgEditStatus" class="save-status"></p>
      <button type="button" class="org-edit-save-btn" onclick="saveOrgEdit()">Сохранить</button>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/org.js"></script>
</body>
</html>
