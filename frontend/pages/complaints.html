<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Жалобы</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="toggleMenu()">☰</button>
      <div class="topbar-logo">
        <div class="paw-icon">🐾</div>
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side profile-icons">⚠️</div>
    </header>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="#" class="side-link">Организации</a>
        <a href="#" class="side-link">База знаний</a>
      </div>
    </aside>

    <section class="create-task-screen">
      <div class="back-row">
        <a href="profile.html" class="back-link">⬅</a>
        <div class="back-title">Жалобы</div>
      </div>

      <form class="task-form-card" onsubmit="submitComplaint(event)">
        <div class="section-subtitle">Новая жалоба</div>
        <label class="form-label">Тип сущности
          <select id="complaint_target_type" class="field" onchange="loadReportReasons()">
            <option value="user">user</option>
            <option value="organization">organization</option>
            <option value="article">article</option>
            <option value="post">post</option>
            <option value="comment">comment</option>
          </select>
        </label>
        <label class="form-label">ID сущности
          <input id="complaint_target_id" class="field" type="number" />
        </label>
        <label class="form-label">Причина
          <select id="complaint_category" class="field">
            <option value="other">Другое</option>
          </select>
        </label>
        <label class="form-label">Описание
          <textarea id="complaint_text" class="field textarea"></textarea>
        </label>
        <button class="submit-btn full-width" type="submit">Отправить жалобу</button>
        <p id="complaintStatus" class="save-status"></p>
      </form>

      <div class="task-form-card settings-gap">
        <div class="section-subtitle">Мои жалобы</div>
        <div id="complaintsList"></div>
      </div>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script>
    loadComplaintsPage();
  </script>
</body>
</html>
