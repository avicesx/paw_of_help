<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Настройки</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="toggleMenu()">☰</button>
      <div class="topbar-logo">
        <div class="paw-icon">🐾</div>
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side profile-icons">⚙</div>
    </header>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="#" class="side-link">Организации</a>
        <a href="#" class="side-link">База знаний</a>
      </div>
    </aside>

    <section class="create-task-screen">
      <div class="back-row">
        <a href="profile.html" class="back-link">⬅</a>
        <div class="back-title">Настройки</div>
      </div>

      <form class="task-form-card" onsubmit="saveAccountSettings(event)">
        <div class="section-subtitle">Аккаунт</div>
        <label class="form-label">Имя
          <input id="settings_name" class="field" type="text" />
        </label>
        <label class="form-label">Фамилия
          <input id="settings_last_name" class="field" type="text" />
        </label>
        <label class="form-label">Username
          <input id="settings_username" class="field" type="text" />
        </label>
        <label class="form-label">E-mail
          <input id="settings_email" class="field" type="email" />
        </label>
        <label class="form-label">Телефон
          <input id="settings_phone" class="field" type="text" />
        </label>
        <button class="submit-btn full-width" type="submit">Сохранить аккаунт</button>
        <p id="settingsStatus" class="save-status"></p>
      </form>

      <form class="task-form-card settings-gap" onsubmit="saveVolunteerProfile(event)">
        <div class="section-subtitle">Профиль волонтёра</div>
        <div id="volunteerStats" class="small-muted">—</div>

        <label class="form-label">Локация
          <input id="vol_location" class="field" type="text" />
        </label>

        <div class="double-grid">
          <label class="form-label">Радиус, км
            <input id="vol_radius_km" class="field" type="number" min="0" />
          </label>
          <label class="form-label">Тип жилья
            <input id="vol_housing_type" class="field" type="text" />
          </label>
        </div>

        <label class="form-label">Предпочтительные животные
          <input id="vol_preferred_animal_types" class="field" type="text" placeholder="Кошки, собаки" />
        </label>

        <label class="form-label">Доступность
          <textarea id="vol_availability" class="field textarea" placeholder='{"weekdays":"evening"}'></textarea>
        </label>

        <div class="switch-row">
          <label class="checkbox-item"><input id="vol_ready_for_foster" type="checkbox"> Готов к передержке</label>
          <label class="checkbox-item"><input id="vol_has_children" type="checkbox"> Есть дети дома</label>
        </div>

        <label class="form-label">Другие питомцы
          <textarea id="vol_has_other_pets" class="field textarea" placeholder='{"cats":1}'></textarea>
        </label>

        <label class="form-label">Ограничения
          <textarea id="vol_foster_restrictions" class="field textarea"></textarea>
        </label>

        <button class="submit-btn full-width" type="submit">Сохранить профиль волонтёра</button>
        <p id="volunteerStatus" class="save-status"></p>
      </form>

      <form class="task-form-card settings-gap" onsubmit="changePassword(event)">
        <div class="section-subtitle">Смена пароля</div>
        <label class="form-label">Старый пароль
          <input id="old_password" class="field" type="password" />
        </label>
        <label class="form-label">Новый пароль
          <input id="new_password" class="field" type="password" />
        </label>
        <label class="form-label">Повторите новый пароль
          <input id="repeat_new_password" class="field" type="password" />
        </label>
        <button class="submit-btn full-width" type="submit">Обновить пароль</button>
        <p id="passwordStatus" class="save-status"></p>
      </form>

      <div class="logout-wrap">
        <button class="danger-btn" type="button" onclick="logout()">Выйти из аккаунта</button>
      </div>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script>
    loadSettingsPage();
  </script>
</body>
</html>
