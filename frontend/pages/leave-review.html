<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оставить отзыв — Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_leave_review">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>
      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu"><div class="side-menu-inner"></div></aside>

    <section class="leave-review-screen">
      <div class="back-row">
        <a href="chats.html" class="back-link" aria-label="Назад">⬅</a>
      </div>

      <div id="reviewContext" class="review-context-card"></div>

      <div class="review-rating-row">
        <span id="reviewRatingNum" class="review-rating-num">5</span>
        <div id="reviewStars" class="review-stars">
          <span class="rev-star on" data-v="1" onclick="setReviewStars(1)">★</span>
          <span class="rev-star on" data-v="2" onclick="setReviewStars(2)">★</span>
          <span class="rev-star on" data-v="3" onclick="setReviewStars(3)">★</span>
          <span class="rev-star on" data-v="4" onclick="setReviewStars(4)">★</span>
          <span class="rev-star on" data-v="5" onclick="setReviewStars(5)">★</span>
        </div>
      </div>
      <input type="hidden" id="reviewRating" value="5" />

      <textarea id="reviewComment" class="field textarea review-comment" placeholder="Поделитесь впечатлениями..."></textarea>
      <p id="reviewStatus" class="save-status"></p>

      <button class="submit-btn full-width" type="button" onclick="submitLeaveReview()">Сохранить</button>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/tasks.js"></script>
  <script src="../js/chats.js"></script>
</body>
</html>
