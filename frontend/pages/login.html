<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Paw</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <main class="phone-shell">
    <header class="topbar">
      <div class="topbar-side">☰</div>
      <div class="topbar-logo">
        <div class="paw-icon">🐾</div>
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side topbar-links">
        <a href="register.html">Регистрация</a>
      </div>
    </header>

    <section class="auth-screen">
      <h1 class="screen-title">Вход</h1>

      <div class="auth-card">
        <div class="auth-tabs">
          <a class="tab" href="register.html">Регистрация</a>
          <button class="tab active" type="button">Вход</button>
        </div>

        <div class="auth-form">
          <input id="login" class="field" type="text" placeholder="Логин: email или телефон">
          <input id="password" class="field" type="password" placeholder="Пароль">
          <a class="helper-link" href="register.html">Забыли пароль?</a>
          <button class="submit-btn" type="button" onclick="login()">Продолжить</button>
        </div>
      </div>

      <div class="paw-bg">🐾</div>
    </section>
  </main>

  <script src="../js/script.js"></script>
</body>
</html>
