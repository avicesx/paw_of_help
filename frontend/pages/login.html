<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Paw</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="paw-designed page_login">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>

      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>

      <div class="topbar-side topbar-auth-side">
        <a class="topbar-auth-link" href="register.html">Регистрация</a>
      </div>
    </header>

    <section class="auth-screen">
      <div class="auth-card">
        <div class="auth-tabs">
          <a class="tab" href="register.html">Регистрация</a>
          <button class="tab active" type="button">Вход</button>
        </div>

        <div class="auth-form">
          <input id="login" class="field" type="text" placeholder="Логин латиницей">
          <input id="password" class="field" type="password" placeholder="Пароль">
          <a class="helper-link" href="register.html">Забыли пароль?</a>
          <button class="submit-btn" type="button" onclick="login()">Продолжить</button>
        </div>
      </div>

      <div class="paw-bg">🐾</div>
    </section>
  </main>

  <script src="../js/script.js"></script>
</body>
</html>
