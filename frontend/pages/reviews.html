<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Отзывы</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_reviews">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>

      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>

      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="#" class="side-link">Организации</a>
        <a href="#" class="side-link">База знаний</a>
      </div>
    </aside>

    <section class="create-task-screen">
      <div class="back-row">
        <a href="profile.html" class="back-link">⬅</a>
        <div class="back-title">Отзывы</div>
      </div>

      <div class="task-form-card">
        <div class="section-subtitle">Список отзывов</div>
        <label class="form-label">Тип цели
          <select id="review_target_type" class="field" onchange="fetchReviews()">
            <option value="organization">organization</option>
            <option value="volunteer">volunteer</option>
            <option value="task">task</option>
            <option value="foster_request">foster_request</option>
          </select>
        </label>
        <label class="form-label">ID цели
          <input id="review_target_id" class="field" type="number" oninput="fetchReviews()" />
        </label>
        <div id="reviewsList" class="reviews-list"></div>
        <p id="reviewsStatus" class="save-status"></p>
      </div>

      <form class="task-form-card settings-gap" onsubmit="submitReview(event)">
        <div class="section-subtitle">Оставить отзыв</div>
        <label class="form-label">ID пользователя, кому отзыв
          <input id="review_reviewee_id" class="field" type="number" />
        </label>
        <label class="form-label">Оценка
          <select id="review_rating" class="field">
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>
        </label>
        <label class="form-label">Комментарий
          <textarea id="review_comment" class="field textarea"></textarea>
        </label>
        <button class="submit-btn full-width" type="submit">Отправить отзыв</button>
      </form>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script>
    loadReviewsPage();
  </script>
</body>
</html>
