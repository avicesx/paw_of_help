<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Отзывы</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_reviews">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>

      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>

      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="#" class="side-link">Организации</a>
        <a href="#" class="side-link">База знаний</a>
      </div>
    </aside>

    <section class="reviews-screen">
      <div class="back-row">
        <a href="profile.html" class="back-link">⬅</a>
      </div>

      <input type="hidden" id="review_target_type" value="organization" />
      <input type="hidden" id="review_target_id" value="1" />
      <input type="hidden" id="review_reviewee_id" />

      <div class="reviews-summary">
        <div class="reviews-avg-col">
          <div id="reviewsAvg" class="big-rating">0,0</div>
          <div id="reviewsCountLabel" class="reviews-count-label">0 отзывов</div>
        </div>
        <div id="reviewsHistogram" class="reviews-histogram"></div>
      </div>

      <div class="reviews-sort-row">
        <span class="reviews-sort-label">Сортировка</span>
        <select id="reviewsSort" class="field" onchange="renderReviewsList(window.__reviews || [])">
          <option value="new">Сначала новые</option>
          <option value="old">Сначала старые</option>
          <option value="high">Сначала высокий рейтинг</option>
          <option value="low">Сначала низкий рейтинг</option>
        </select>
      </div>

      <div id="reviewsList" class="reviews-list"></div>
      <p id="reviewsStatus" class="save-status"></p>

      <button type="button" class="submit-btn full-width reviews-leave-toggle" onclick="toggleLeaveReview()">Оставить отзыв</button>

      <form id="leaveReviewForm" class="task-form-card reviews-leave-form hidden" onsubmit="submitReview(event)">
        <div class="reviews-leave-title">Ваш отзыв</div>
        <div class="reviews-stars-input" id="reviewStarsInput">
          <span class="rev-star" data-v="1">★</span>
          <span class="rev-star" data-v="2">★</span>
          <span class="rev-star" data-v="3">★</span>
          <span class="rev-star" data-v="4">★</span>
          <span class="rev-star" data-v="5">★</span>
        </div>
        <input type="hidden" id="review_rating" value="5" />
        <textarea id="review_comment" class="field textarea" placeholder="Поделитесь впечатлениями..."></textarea>
        <button class="submit-btn full-width" type="submit">Сохранить</button>
      </form>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script>
    loadReviewsPage();
  </script>
</body>
</html>
