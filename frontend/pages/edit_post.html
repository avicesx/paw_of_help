<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редактировать пост - Paw</title>
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body>
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn" type="button" onclick="toggleMenu()">☰</button>
      <a href="post_feed.html" class="topbar-logo"><div class="paw-icon">🐾</div><div class="paw-title">Paw</div></a>
      <div class="topbar-side profile-icons">
        <div class="notification-container-wrapper"></div>
        <a href="profile.html" class="topbar-profile-link">
          👤
        </a>
      </div>
    </header>
    
    <div class="back-btn-container">
      <button class="icon-btn" type="button" onclick="history.back()">←</button>
    </div>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="org_selector.html" class="side-link">Организации</a>
        <a href="knowledge_base.html" class="side-link">База знаний</a>
        <a href="post_feed.html" class="side-link">Лента новостей</a>
        <a href="chats.html" class="side-link">Чаты</a>
      </div>
    </aside>

    <section class="add-post-screen">
      <h1 class="screen-title">Редактирование</h1>
      <div class="post-editor">
        <input type="text" id="postTitle" class="post-title-input" placeholder="Заголовок" />
        <textarea class="post-textarea" id="postContent" placeholder="Текст поста..."></textarea>
        <div class="post-actions">
          <button type="button" class="icon-btn" onclick="document.getElementById('fileInput').click()" style="font-size: 24px;">📎</button>
        </div>
        <div id="imagePreview" style="margin-top: 10px; position: relative; display: none;">
            <img src="" id="previewImg" style="width: 100%; border-radius: 8px; max-height: 200px; object-fit: cover;">
            <button type="button" onclick="removeImage()" style="position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-weight: bold;">✕</button>
        </div>
      </div>
      <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(this.files[0])" accept="image/*" />
      <div class="publish-section">
        <button class="publish-btn" type="button" onclick="handleUpdate()">Сохранить изменения</button>
      </div>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/posts.js"></script>
  <script>
    const postId = new URLSearchParams(window.location.search).get('id');
    let uploadedImageUrl = null;

    async function loadPostForEdit() {
      if (!postId) return;
      try {
        const { data: post } = await apiRequest(`/posts/${postId}`, { auth: true });
        document.getElementById('postTitle').value = post.title || '';
        document.getElementById('postContent').value = post.content || '';
        if (post.attachments?.length) {
            uploadedImageUrl = post.attachments[0];
            const preview = document.getElementById('imagePreview');
            const img = document.getElementById('previewImg');
            img.src = uploadedImageUrl;
            preview.style.display = 'block';
        }
      } catch (err) {
        alert("Не удалось загрузить пост");
        history.back();
      }
    }

    async function handleFileSelect(file) {
        if (!file) return;
        try {
            uploadedImageUrl = await uploadFile(file);
            document.getElementById('previewImg').src = uploadedImageUrl;
            document.getElementById('imagePreview').style.display = 'block';
        } catch (err) { alert("Ошибка загрузки: " + err.message); }
    }

    function removeImage() {
        uploadedImageUrl = null;
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('fileInput').value = '';
    }

    async function handleUpdate() {
      const payload = {
        title: document.getElementById('postTitle').value.trim(),
        content: document.getElementById('postContent').value.trim(),
        attachments: uploadedImageUrl ? [uploadedImageUrl] : [],
        is_published: false
      };
      try {
        await apiRequest(`/posts/${postId}`, { method: 'PATCH', auth: true, body: JSON.stringify(payload) });
        alert("Обновлено! Пост отправлен на модерацию.");
        window.location.href = 'post_feed.html';
      } catch (err) { alert("Ошибка: " + err.message); }
    }
    document.addEventListener('DOMContentLoaded', loadPostForEdit);
  </script>
</body>
</html>
