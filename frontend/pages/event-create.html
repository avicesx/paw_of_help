<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Создание мероприятия</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="paw-designed page_event_create">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>

      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>

      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="#" class="side-link">Организации</a>
        <a href="#" class="side-link">База знаний</a>
      </div>
    </aside>

    <section class="event-create-screen">
      <div class="back-row">
        <a href="calendar.html" class="back-link">⬅</a>
        <div class="back-title">Создание мероприятия</div>
      </div>

      <form class="task-form-card" onsubmit="createEvent(event)">
        <label class="form-label">Название мероприятия
          <input id="eventTitle" class="field" type="text" placeholder="Например: День помощи животным" />
        </label>
        <label class="form-label">Описание
          <textarea id="eventDescription" class="field textarea" placeholder="Кратко опиши мероприятие"></textarea>
        </label>
        <label class="form-label">Вид
          <select id="eventType" class="field">
            <option value="adoption">Пристройство</option>
            <option value="fundraising">Сбор помощи</option>
            <option value="volunteer">Волонтёрство</option>
            <option value="meeting">Встреча</option>
            <option value="other">Другое</option>
          </select>
        </label>
        <label class="form-label">Местоположение
          <input id="eventLocation" class="field" type="text" placeholder="Адрес или площадка" />
          <input id="eventLocationLat" type="hidden" />
          <input id="eventLocationLng" type="hidden" />
        </label>

        <div class="figma-map-block">
          <div id="eventLocationMap" class="address-map"></div>
          <button id="eventFindAddressBtn" class="map-search-btn" type="button">Найти адрес</button>
          <p id="eventMapStatus" class="map-status">Выбери точку на карте — адрес подставится автоматически.</p>
        </div>
        <label class="event-oneday-check">
          <input type="checkbox" id="eventOneDay" checked onchange="toggleEventOneDay()" />
          <span>Мероприятие на один день</span>
        </label>
        <div id="eventOneDayBlock">
          <label class="form-label">Дата
            <input id="eventDate" class="field" type="date" />
          </label>
          <div class="double-grid">
            <label class="form-label">Время начала
              <input id="eventTimeFrom" class="field" type="time" />
            </label>
            <label class="form-label">Время окончания
              <input id="eventTimeTo" class="field" type="time" />
            </label>
          </div>
        </div>
        <div id="eventRangeBlock" style="display:none">
          <div class="double-grid">
            <label class="form-label">Дата и время начала
              <input id="eventStart" class="field" type="datetime-local" />
            </label>
            <label class="form-label">Дата и время окончания
              <input id="eventEnd" class="field" type="datetime-local" />
            </label>
          </div>
        </div>

        <button class="submit-btn full-width" type="submit">Опубликовать</button>
        <p id="eventCreateStatus" class="save-status"></p>
      </form>

    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/maps.js"></script>
  <script src="../js/events.js"></script>
  <script>
    initAddressMap({
      mapId: "eventLocationMap",
      inputId: "eventLocation",
      latId: "eventLocationLat",
      lngId: "eventLocationLng",
      statusId: "eventMapStatus",
      searchButtonId: "eventFindAddressBtn"
    });
  </script>
  
</body>
</html>
