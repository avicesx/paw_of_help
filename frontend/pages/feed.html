<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Лента задач</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn" type="button" onclick="toggleMenu()">☰</button>
      <div class="topbar-logo">
        <div class="paw-icon">🐾</div>
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side profile-icons">🔔 👤</div>
    </header>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="#" class="side-link">Организации</a>
        <a href="#" class="side-link">База знаний</a>
      </div>
    </aside>

    <section class="feed-screen">
      <h1 class="screen-title">Лента задач</h1>
      <div class="task-tabs">
        <button id="feedRecommendedBtn" class="task-tab active" type="button" onclick="switchFeedMode('recommended')">Рекомендованные</button>
        <button id="feedAllBtn" class="task-tab" type="button" onclick="switchFeedMode('all')">Все задачи</button>
      </div>
      <div class="filter-panel visible-panel">
        <input id="feedSearch" class="field" type="text" placeholder="Поиск по задачам" oninput="loadTaskFeed()" />
        <select id="feedTypeFilter" class="field" onchange="loadTaskFeed()">
          <option value="">Все типы</option>
          <option value="transport">Перевозка</option>
          <option value="foster">Передержка</option>
          <option value="care">Уход</option>
          <option value="other">Другое</option>
        </select>
        <select id="feedUrgencyFilter" class="field" onchange="loadTaskFeed()">
          <option value="">Любая срочность</option>
          <option value="low">Низкая</option>
          <option value="normal">Обычная</option>
          <option value="medium">Средняя</option>
          <option value="high">Высокая</option>
        </select>
      </div>
      <div id="feedList" class="tasks-list"></div>

    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/tasks.js"></script>
  <script src="../js/feed.js"></script>
  <script>loadTaskFeed();</script>
</body>
</html>
