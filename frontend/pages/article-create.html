<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Создание статьи</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_article_create">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>

      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>

      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu"><div class="side-menu-inner"></div></aside>

    <section class="create-task-screen">
      <div class="back-row">
        <a href="knowledge-base.html" class="back-link">⬅</a>
        <div class="back-title">Создание статьи</div>
      </div>

      <form class="task-form-card article-card" onsubmit="createArticle(event)">
        <label class="form-label">
          Заголовок:
          <input id="articleTitle" class="field" type="text" placeholder="Название статьи" />
        </label>

        <label class="form-label">
          Текст статьи:
          <textarea id="articleContent" class="field textarea article-textarea" placeholder="Ваш текст...."></textarea>
        </label>

        <button class="submit-btn full-width" type="submit">Опубликовать</button>
        <p id="articleStatus" class="save-status"></p>
      </form>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
</body>
</html>
