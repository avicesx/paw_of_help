<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Календарь событий</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn" type="button" onclick="toggleMenu()">☰</button>
      <div class="topbar-logo">
        <div class="paw-icon">🐾</div>
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side profile-icons">🔔 👤</div>
    </header>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="#" class="side-link">Организации</a>
        <a href="#" class="side-link">База знаний</a>
      </div>
    </aside>

    <section class="calendar-screen">
      <h1 class="screen-title">Календарь событий</h1>
      <div class="calendar-panel">
        <div class="calendar-head">
          <button class="icon-btn" type="button" onclick="changeCalendarMonth(-1)">←</button>
          <strong id="calendarMonthLabel">Месяц</strong>
          <button class="icon-btn" type="button" onclick="changeCalendarMonth(1)">→</button>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </div>
      <div class="calendar-events-panel">
        <h2 id="calendarSelectedTitle">Мероприятия месяца</h2>
        <div id="calendarEventsList"></div>
      </div>

    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/events.js"></script>
  <script>loadCalendarPage();</script>
</body>
</html>
