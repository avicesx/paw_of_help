<!DOCTYPE html>

  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn" type="button" onclick="toggleMenu()">☰</button>
      <div class="topbar-logo"><div class="paw-icon">🐾</div><div class="paw-title">Paw</div></div>
      <div class="topbar-side profile-icons">🔔 👤</div>
    </header>

    <aside id="sideMenu" class="side-menu"><div class="side-menu-inner">
      <a href="profile.html" class="side-link">Профиль</a>
      <a href="settings.html" class="side-link">Настройки</a>
      <a href="tasks.html" class="side-link">Задачи</a>

      <h1 class="screen-title">Выбрать профиль животного</h1>

        <div class="back-title">Ваши животные</div>
      </div>

      <input id="animalSearch" class="field animal-search" type="text" placeholder="Поиск" oninput="renderAnimals()" />

      <div class="create-animal-block">
        <a id="createAnimalLink" href="animal-create.html" class="primary-action-link">+ Добавить животное</a>
      </div>

      <div id="animalsList" class="animals-list"></div>
    </section>
  </main>
  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/tasks.js"></script>
  <script>
    setupAnimalSelectPage();
    renderAnimals();
  </script>
