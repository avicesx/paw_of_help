<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — Paw</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <main class="phone-shell">
    <header class="topbar">
      <div class="topbar-side">☰</div>
      <div class="topbar-logo">
        <div class="paw-icon">🐾</div>
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side topbar-links">
        <a href="login.html">Вход</a>
      </div>
    </header>

    <section class="auth-screen">
      <h1 class="screen-title">Регистрация</h1>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="tab active" type="button">Регистрация</button>
          <a class="tab" href="login.html">Вход</a>
        </div>

        <div class="auth-form">
          <input id="name" class="field" type="text" placeholder="Имя">
          <input id="email" class="field" type="email" placeholder="E-mail">
          <input id="phone" class="field" type="text" placeholder="Телефон">
          <input id="password" class="field" type="password" placeholder="Пароль">
          <p class="hint">Нужны имя, пароль и хотя бы один контакт: email или телефон.</p>
          <button class="submit-btn" type="button" onclick="register()">Продолжить</button>
        </div>
      </div>

      <div class="paw-bg">🐾</div>
    </section>
  </main>

  <script src="../js/script.js"></script>
</body>
</html>
