<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статья — Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_kb_article">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>
      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>
      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu"><div class="side-menu-inner"></div></aside>

    <section class="kb-article-screen">
      <div class="back-row">
        <a href="knowledge-base.html" class="back-link" aria-label="Назад">⬅</a>
      </div>

      <article class="kb-article-card">
        <div class="kb-card-head">
          <span class="kb-avatar" aria-hidden="true"></span>
          <span id="kbArticleAuthor" class="kb-author">Автор</span>
        </div>
        <h1 id="kbArticleTitle" class="kb-article-title">Статья</h1>
        <div id="kbArticleContent" class="kb-article-content"></div>
        <div class="kb-article-foot">
          <button id="kbLikeBtn" type="button" class="kb-like-btn" onclick="likeKbArticle()">♡ Нравится</button>
          <span id="kbArticleViews" class="kb-stat">👁 0</span>
        </div>
      </article>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/kb.js"></script>
</body>
</html>
