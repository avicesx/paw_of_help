<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Написать пост — Paw</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="paw-designed page_post_create">
  <main class="phone-shell">
    <header class="topbar">
      <button class="icon-btn topbar-side menu-button" type="button" onclick="if (window.toggleMenu) toggleMenu()" aria-label="Открыть меню">
        <img src="../assets/topbar/icon-menu.svg" class="topbar-svg-icon topbar-menu-icon" alt="" />
      </button>

      <div class="topbar-logo">
        <img src="../assets/topbar/paw-logo.svg" class="topbar-paw-logo" alt="Paw" />
        <div class="paw-title">Paw</div>
      </div>

      <div class="topbar-side profile-icons">
        <span class="topbar-icon-wrap">
          <img src="../assets/topbar/icon-bell.svg" class="topbar-svg-icon topbar-bell-icon" alt="Уведомления" />
          <span id="notificationBadge" class="badge-dot" style="display:none"></span>
        </span>
        <a href="profile.html" class="topbar-profile-link" aria-label="Профиль">
          <img src="../assets/topbar/icon-user.svg" class="topbar-svg-icon topbar-user-icon" alt="Профиль" />
        </a>
      </div>
    </header>

    <aside id="sideMenu" class="side-menu"><div class="side-menu-inner"></div></aside>

    <section class="post-create-screen">
      <div class="back-row">
        <a href="feed.html" class="back-link" aria-label="Назад">⬅</a>
      </div>

      <div class="post-create-card">
        <textarea id="postText" class="post-text-area" placeholder="Ваш текст...."></textarea>
        <img id="postPhotoThumb" class="post-photo-thumb" alt="" />
        <input type="file" id="postPhotoInput" accept="image/*" style="display:none" onchange="attachPostPhoto(this)" />
        <button type="button" class="post-attach-btn" onclick="document.getElementById('postPhotoInput').click()" aria-label="Прикрепить фото"></button>
      </div>

      <p id="postStatus" class="save-status"></p>
      <button type="button" class="post-publish-btn" onclick="createPost()">Опубликовать</button>
    </section>
  </main>

  <script src="../js/script.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/feed.js"></script>
  <script>
    ensureAuth("login.html");
    loadNotificationsCount();
  </script>
</body>
</html>
