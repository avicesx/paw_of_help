<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>База знаний</title>
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body>
  <main class="phone-shell">
    <div class="bg-paw-overlay"><span>
      <img src="../assets/paw-bg.png" alt="Paw Background" class="bg-paw-image">
    </span></div>

    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" type="button" onclick="toggleMenu()">
          <img src="../assets/topbar/icon-menu.svg" alt="Меню" class="topbar-icon">
        </button>
      </div>

      <a href="post_feed.html" class="topbar-logo">
        <div class="paw-icon">
          <img src="../assets/topbar/paw-logo.svg" alt="Paw" class="paw-icon-img">
        </div>
      </a>

      <div class="topbar-right">
        <div class="notification-container-wrapper"></div>
        
        <a href="profile.html" class="topbar-profile-link">
          <img src="../assets/topbar/profile-icon.svg" alt="Профиль" class="topbar-icon">
        </a>
      </div>
    </header>

    <div class="back-btn-container">
      <button class="icon-btn" type="button" onclick="history.back()">
        <img src="../assets/topbar/arrow.svg" alt="Назад" class="topbar-icon">
      </button>
    </div>

    <aside id="sideMenu" class="side-menu">
      <div class="side-menu-inner">
        <a href="profile.html" class="side-link">Профиль</a>
        <a href="settings.html" class="side-link">Настройки</a>
        <a href="tasks.html" class="side-link">Задачи</a>
        <a href="feed.html" class="side-link">Лента задач</a>
        <a href="events.html" class="side-link">Мероприятия</a>
        <a href="calendar.html" class="side-link">Календарь</a>
        <a href="reviews.html" class="side-link">Отзывы</a>
        <a href="complaints.html" class="side-link">Жалобы</a>
        <a href="animal-select.html" class="side-link">Животные</a>
        <a href="org_selector.html" class="side-link">Организации</a>
        <a href="knowledge_base.html" class="side-link">База знаний</a>
        <a href="post_feed.html" class="side-link">Лента новостей</a>
        <a href="chats.html" class="side-link">Чаты</a>
      </div>
    </aside>

    <div class="add-post-screen">
        <h2 class="screen-title">Редактировать статью</h2>

        <div class="post-editor">
            <input type="text" id="articleTitle" class="post-title-input" placeholder="Заголовок статьи">
            
            <div class="post-category-section">
                <label for="articleTags" class="post-category-label">Теги</label>
                <div id="articleTagsContainer" class="checkbox-group">
                </div>
            </div>

            <textarea id="articleContent" class="post-textarea" placeholder="Полный текст статьи"></textarea>
        </div>

        <div class="publish-section">
            <button class="publish-btn" id="saveArticleBtn">Сохранить изменения</button>
            <div id="articleEditStatus" class="save-status"></div>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/knowledgeTemplates.js"></script>
    <script src="../js/articles.js"></script>
    <script src="../js/dropdown.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (!articleId) {
                alert('ID статьи не указан для редактирования.');
                window.location.href = 'knowledge_base.html';
                return;
            }

            await loadArticleForEdit(articleId);

            document.getElementById('saveArticleBtn').addEventListener('click', async () => {
                const title = document.getElementById('articleTitle').value;
                const content = document.getElementById('articleContent').value;
                const selectedTags = Array.from(document.querySelectorAll('#articleTagsContainer input[type="checkbox"]:checked')).map(cb => parseInt(cb.value));
                
                await updateArticle(articleId, { title, content, tag_ids: selectedTags });
            });
        });
    </script>
</body>
</html>
